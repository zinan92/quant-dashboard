commands:
  install: cd quant-dashboard && python3 -m pip install -r requirements.txt
  test: cd quant-dashboard && python3 -m pytest tests/ -v --tb=short -x
  lint: cd quant-dashboard && python3 -m ruff check src/
  typecheck: cd quant-dashboard && python3 -m mypy src/ --ignore-missing-imports

services:
  streamlit:
    start: cd quant-dashboard && streamlit run streamlit_app.py --server.port 8020 --server.headless true &
    stop: lsof -ti :8020 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8020/_stcore/health
    port: 8020
    depends_on: []
