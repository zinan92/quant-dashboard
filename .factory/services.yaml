commands:
  install_backend: cd quant-dashboard && python3 -m pip install -r requirements.txt
  install_frontend: cd quant-dashboard/frontend && pnpm install
  build_frontend: cd quant-dashboard/frontend && pnpm run build
  test: cd quant-dashboard && python3 -m pytest tests/ -v --tb=short -x -j4
  lint: cd quant-dashboard && python3 -m ruff check src/ app/ --fix
  typecheck: cd quant-dashboard && python3 -m mypy app/ src/ --ignore-missing-imports

services:
  api:
    start: cd quant-dashboard && python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8020 &
    stop: lsof -ti :8020 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8020/api/v1/ping
    port: 8020
    depends_on: []
