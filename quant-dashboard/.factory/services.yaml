commands:
  install: pip install -r requirements.txt
  test: pytest tests/ -v
  lint: ruff check src/ tests/
  typecheck: mypy src/ --ignore-missing-imports

services:
  streamlit:
    start: streamlit run streamlit_app.py --server.port 8501 --server.headless true
    stop: lsof -ti :8501 | xargs kill
    healthcheck: curl -sf http://localhost:8501
    port: 8501
    depends_on: []
